name: Daily Bot Tasks

on:
  schedule:
    # 每天早上 7:30 (UTC+8)，即 UTC 23:30
    - cron: '30 23 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (不发送消息，只打印日志)'
        required: false
        default: 'false'

jobs:
  run-bots:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Daily News Summary Bot
        env:
          SERVERCHAN_TOKEN: ${{ secrets.SERVERCHAN_TOKEN }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          CHAT_ID:          ${{ secrets.CHAT_ID }}
          DRY_RUN:          ${{ github.event.inputs.dry_run || 'false' }}
        run: python daily_news_bot.py

      - name: Commit state changes
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add state/
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "chore: update bot state" && git push)
