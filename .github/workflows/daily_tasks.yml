name: Daily Bot Tasks

on:
  schedule:
    # 每天早上 7:30 (UTC+8) 执行，也就是 UTC 23:30
    - cron: '30 23 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  run-bots:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许机器人推送代码（更新状态文件）
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Ruanyifeng Weekly Bot
        env:
          SERVERCHAN_TOKEN: ${{ secrets.SERVERCHAN_TOKEN }}
        run: python ruanyf_weekly_bot.py
        
      - name: Run Daily News Summary Bot
        env:
          SERVERCHAN_TOKEN: ${{ secrets.SERVERCHAN_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_news_bot.py
        
      - name: Commit state changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add state/
          # 只有在有更改时才提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update bot state" && git push)
